{id:48,t:"Tiroides lenta: síntomas que se confunden con cansancio",cat:"hormonas",tag:"Tiroides",e:"🦋",bg:"bg2",au:"Dra. Morales",min:10,v:"16K",ex:"El hipotiroidismo subclínico afecta al 10% de mujeres y muchas no lo saben porque los síntomas se normalizan.",p1:"El hipotiroidismo tiene síntomas que se solapan con el agotamiento moderno: fatiga que no mejora con el descanso, frío constante, piel seca, caída del cabello especialmente en las cejas externas, estreñimiento, dificultad para perder peso, bradicardia y niebla mental. Estos síntomas aparecen gradualmente y muchas mujeres los normalizan durante años antes de recibir diagnóstico.",p2:"La analítica básica de tiroides debe incluir TSH más T4 libre más T3 libre más anticuerpos TPO. Muchos médicos solo piden TSH, que puede estar dentro del rango normal de 0.5-4.5 pero con T3 baja y síntomas presentes. El rango óptimo de TSH según endocrinólogos funcionales es 1-2.5. El yodo, el selenio y el zinc son los minerales más críticos para la función tiroidea.",tips:["Pide TSH + T4L + T3L + anticuerpos TPO","TSH óptima: 1-2.5, no solo dentro del rango","Selenio 200mcg: cofactor para conversión T4→T3","Gluten puede aumentar anticuerpos en Hashimoto","Caída de cejas externas: señal clásica de hipotiroidismo"]},
{id:49,t:"Dominancia estrogénica: síntomas y cómo corregirla",cat:"hormonas",tag:"Estrógenos",e:"🫶",bg:"bg1",au:"Nutrióloga Alba",min:7,v:"11K",ex:"Un desequilibrio hormonal cada vez más común que causa dolor premenstrual, retención y fibromas.",p1:"La dominancia estrogénica ocurre cuando los estrógenos son altos en relación a la progesterona, no necesariamente con estrógenos absolutos altos. Síntomas: reglas abundantes y dolorosas, sensibilidad en senos, retención de líquidos en la segunda mitad del ciclo, hinchazón, ansiedad y dificultad para perder peso. Es favorecida por estrés crónico, exceso de grasa corporal y xenoestrógenos de plásticos y pesticidas.",p2:"Estrategias para reducirla: DIM (diindolilmetano, presente en crucíferas) favorece la metabolización de estrógenos por la vía saludable. El hígado es quien metaboliza los estrógenos: priorizar la salud hepática reduciendo el alcohol y apoyando con cardo mariano. Eliminar plásticos de alimentos y cosméticos. Aumentar fibra a 25-30g para la excreción de estrógenos por el intestino.",tips:["DIM de crucíferas: favorece metabolización sana","Fibra 25-30g diarios: esencial para excreción","Eliminar plásticos: xenoestrógenos disruptores","Hígado sano = metabolismo hormonal óptimo","El estrés cronifica la dominancia estrogénica"]},
{id:50,t:"Los análisis de sangre que toda mujer debería hacerse",cat:"biohacking",tag:"Analíticas",e:"🩺",bg:"bg2",au:"Dra. Martín",min:10,v:"18K",ex:"El panel de analítica completo que la medicina funcional usa y que el sistema público raramente pide.",p1:"El panel mínimo anual más allá del básico: hemograma completo, glucosa en ayunas y HbA1c (marcadores metabólicos), perfil lipídico completo, función tiroidea completa (TSH, T4 libre, T3 libre, anticuerpos TPO), vitamina D 25-OH, B12, ferritina, folato, magnesio eritrocitario y PCR de alta sensibilidad para detectar inflamación silenciosa.",p2:"Los marcadores más olvidados pero más informativos: ferritina (el almacén de hierro que puede estar bajo con hemograma normal), vitamina D (el 40-60% de la población española tiene deficiencia severa), homocisteína (marcador de riesgo cardiovascular y déficit de B vitaminas) y DHEA-S (hormona suprarrenal que baja con el estrés crónico). Estos cuatro explican muchos casos de fatiga crónica inexplicable.",tips:["Ferritina óptima: 70-150 ng/mL","Vitamina D óptima: 50-70 ng/mL","PCR alta sensibilidad: detecta inflamación subclínica","HbA1c: el mejor marcador de salud metabólica","Pide DHEA-S si hay fatiga crónica con analítica normal"]},
{id:51,t:"HRV: por qué medir la variabilidad del corazón",cat:"biohacking",tag:"HRV",e:"🫀",bg:"bg5",au:"Cardio Lab",min:7,v:"8.8K",ex:"El marcador de salud más completo que mide la resiliencia del sistema nervioso autónomo en tiempo real.",p1:"La variabilidad de la frecuencia cardíaca (HRV) mide la variación en milisegundos entre latidos consecutivos. Paradójicamente, mayor variabilidad significa mejor salud. Una HRV alta indica que el sistema nervioso autónomo puede alternar fluidamente entre simpático y parasimpático. La HRV baja es marcador de estrés crónico, sobreentrenamiento, enfermedad inminente y mala calidad de sueño.",p2:"Dispositivos para medir HRV: Oura Ring (el más preciso), Whoop, Apple Watch (menos preciso para HRV). Cómo usar la medición: tómala cada mañana al despertar antes de levantarte. Un HRV más bajo que tu media personal es señal de día de recuperación activa. El alcohol reduce el HRV hasta 2-3 noches después, incluso con cantidades moderadas.",tips:["Mayor HRV = mayor resiliencia del sistema nervioso","Mídela cada mañana antes de levantarte","Oura Ring: el más preciso para HRV","Alcohol: reduce el HRV hasta 3 noches después","HRV baja = señal para recuperación, no HIIT"]},
{id:52,t:"Autofagia y detox celular: cómo activarla naturalmente",cat:"biohacking",tag:"Autofagia",e:"🧬",bg:"bg7",au:"Dr. Blanco",min:6,v:"10K",ex:"El proceso de limpieza celular que reduce el riesgo de enfermedades y ralentiza el envejecimiento.",p1:"La autofagia (literalmente comerse a uno mismo) es el proceso por el cual las células eliminan componentes dañados, proteínas mal plegadas y patógenos. Se activa por privación de nutrientes mediante el ayuno, el ejercicio y la restricción de calorías. A nivel celular, la autofagia reduce el riesgo de neurodegeneración, cáncer y enfermedades metabólicas. Yoshinori Ohsumi ganó el Nobel en 2016 por su investigación.",p2:"Formas naturales de activarla: ayuno de 14-16 horas (la autofagia se activa alrededor de las 12-16h de ayuno), ejercicio de resistencia intenso, restricción calórica moderada, café negro que inhibe mTOR, espermidina presente en trigo germinado y champiñones, y polifenoles como el resveratrol y la quercetina.",tips:["Ayuno 14-16h: la forma más efectiva","Café negro activa autofagia inhibiendo mTOR","Ejercicio de resistencia intenso: activa autofagia muscular","Espermidina en trigo germinado: activador potente","La autofagia funciona mejor sin insulina elevada"]},
{id:53,t:"Duchas frías: los beneficios reales separados del hype",cat:"biohacking",tag:"Frío",e:"🌊",bg:"bg5",au:"Cold Science",min:7,v:"15K",ex:"Las duchas frías están en todas partes. Separamos la ciencia real de la mitología biohacker.",p1:"Los beneficios reales y demostrados de la exposición al frío: aumento de norepinefrina del 280-300% con inmersión en agua a 14°C, lo que mejora el foco, humor y atención durante horas. Activación del tejido adiposo marrón que quema grasa para generar calor. Mejora de la sensibilidad a la insulina. Reducción de marcadores de inflamación con práctica regular y sostenida.",p2:"Lo que no está demostrado con las simples duchas frías: la ducha tiene mucho menos impacto que la inmersión real. Para beneficios cardiovasculares y de composición corporal significativos, necesitas inmersión en agua fría a 10-14°C dos o tres veces por semana. Empieza gradualmente terminando tu ducha normal con 30-90 segundos de agua fría durante las primeras semanas.",tips:["Termina tu ducha con 30-90 seg de agua fría","Inmersión en bañera: significativamente más efectiva","La norepinefrina sube 280% con agua a 14°C","Por la mañana: activa; por la noche: puede dificultar el sueño","Empieza por semanas con agua fresca antes de fría"]},
{id:54,t:"Sauna: el protocolo para máximos beneficios cardiovasculares",cat:"biohacking",tag:"Sauna",e:"🔥",bg:"bg8",au:"Thermal Health",min:8,v:"9.1K",ex:"Los estudios finlandeses que demuestran que 4 sesiones semanales de sauna reducen el riesgo cardiovascular un 48%.",p1:"La investigación más importante sobre sauna es del Dr. Jari Laukkanen en Finlandia: un estudio de 20 años con 2.315 participantes demostró que 4-7 sesiones de sauna por semana reducen el riesgo de muerte cardiovascular un 50% y la demencia un 65%. El mecanismo incluye que la sauna eleva el gasto cardíaco equivalente a ejercicio aeróbico moderado, mejora la función endotelial y reduce la inflamación.",p2:"El protocolo basado en investigación: 80-100°C durante 15-20 minutos, 3-4 rondas, con inmersión en frío entre rondas para activar la proteína de choque térmico. La deshidratación es el mayor riesgo: bebe 500ml de agua por cada ronda. La ducha fría posterior al calor tiene el mayor efecto en los marcadores cardiovasculares. Evitar sauna las 4h antes de dormir si dificulta el sueño.",tips:["4 sesiones semanales: máximo beneficio cardiovascular","80-100°C durante 15-20 min por ronda","Ducha fría entre rondas: maximiza los efectos","500ml de agua por ronda para hidratación","No combines alcohol y sauna: es el mayor riesgo"]},
{id:55,t:"Ashwagandha, rhodiola o lion's mane: cuál elegir",cat:"suplementos",tag:"Adaptógenos",e:"🍄",bg:"bg2",au:"Herbal Science",min:8,v:"12K",ex:"Los tres adaptógenos más populares con mecanismos distintos. Cuál tomar según tu objetivo concreto.",p1:"Ashwagandha KSM-66 o Sensoril es el más respaldado para reducir cortisol un 27% en 8 semanas, mejorar el sueño, la resistencia al estrés y la libido. Mejor para ansiedad crónica, cortisol alto y recuperación. Rhodiola rosea actúa más rápido, mejora el rendimiento cognitivo bajo estrés y la resistencia física. Mejor para fatiga mental, agotamiento por sobretrabajo y rendimiento deportivo.",p2:"Lion's mane (Hericium erinaceus) estimula el NGF (factor de crecimiento nervioso) y BDNF, mejorando la neuroplasticidad, la memoria y el foco. No actúa rápido: necesita 4-8 semanas para efectos cognitivos. El stack matutino más popular: lion's mane más rhodiola para el día. La ashwagandha es mejor tomarla por la noche por su efecto sobre el cortisol y la relajación.",tips:["Ashwagandha: ansiedad y cortisol","Rhodiola: rendimiento y fatiga mental","Lion's mane: foco y memoria a largo plazo","Ashwagandha por la noche; los otros por la mañana","Da 4-8 semanas antes de evaluar cualquier adaptógeno"]},
{id:56,t:"Vitamina D3+K2: el dúo que el 60% necesita y no toma",cat:"suplementos",tag:"Vitamina D",e:"☀️",bg:"bg4",au:"Dr. Ortiz",min:7,v:"11K",ex:"La deficiencia más común en España. Sus consecuencias van mucho más allá de los huesos.",p1:"La vitamina D3 no es solo para los huesos: regula la expresión de más de 1.000 genes, es fundamental para el sistema inmune reduciendo la susceptibilidad a infecciones respiratorias, mejora el humor y reduce el riesgo de depresión estacional. El rango óptimo en sangre es 50-70 ng/mL, pero el 60% de los españoles están por debajo de 20 ng/mL, en déficit claro.",p2:"La K2 (MK-7) es esencial para tomar con la D3: dirige el calcio a los huesos y los dientes donde debe ir y evita que se deposite en las arterias. Sin K2, la D3 a dosis altas puede aumentar el calcio arterial. La dosis estándar sin analítica previa: D3 2000-4000 UI más K2 MK-7 90-200 mcg diarios con la comida más grasa del día.",tips:["El 60% de españoles tienen déficit severo de D3","D3 siempre con K2 MK-7 para evitar calcificación","Tómala con la comida más grasa: es liposoluble","Analítica cada 6 meses para ajustar dosis","2000-4000 UI diarios: dosis de mantenimiento segura"]},
{id:57,t:"Zinc: el mineral que transforma la piel y el cabello",cat:"suplementos",tag:"Zinc",e:"💎",bg:"bg3",au:"Mineral Lab",min:6,v:"7.4K",ex:"El segundo mineral más abundante en el cuerpo humano y uno de los más deficitarios en dietas modernas.",p1:"El zinc es fundamental para la cicatrización de la piel y la reducción del acné (inhibe la bacteria P. acnes y reduce la producción de sebo), el crecimiento del cabello (la deficiencia causa alopecia difusa), la función inmune y la síntesis de testosterona. El acné moderado responde a zinc bisglicinato de 30mg al día de forma comparable a los antibióticos tópicos pero sin sus efectos secundarios.",p2:"Las mejores formas: bisglicinato o picolinato (alta biodisponibilidad, mínimos efectos gastrointestinales). Evitar el óxido de zinc oral que tiene absorción mínima. Dosis: 15-30mg al día como suplemento, nunca en ayunas para evitar náuseas. El zinc compite con el cobre en la absorción: si suplementas más de 30mg por más de 6 meses, añade 2mg de cobre.",tips:["Zinc bisglicinato 30mg: efectivo contra el acné","Nunca en ayunas: causa náuseas","Más de 30mg por 6 meses: añade 2mg de cobre","Picolinato o bisglicinato: las formas más absorbibles","Caída difusa del cabello: descarta déficit de zinc"]},
{id:58,t:"Microbioma intestinal: los 5 hábitos que más lo cuidan",cat:"digestion",tag:"Microbioma",e:"🦠",bg:"bg2",au:"Gut Health Institute",min:9,v:"13K",ex:"Tu microbioma controla el 70% de tu sistema inmune y produce el 95% de tu serotonina. Cuídalo así.",p1:"El microbioma intestinal es el ecosistema de trillones de bacterias que vive en tu intestino. Su diversidad está directamente relacionada con la salud inmune, mental y metabólica. Los hábitos que más lo dañan: antibióticos sin probióticos de recuperación, dieta baja en fibra, alcohol, estrés crónico (el eje intestino-cerebro es bidireccional) y exceso de desinfectantes.",p2:"Los hábitos que más lo mejoran: 30 plantas diferentes por semana (el mayor predictor de diversidad según el estudio de Tim Spector), fermentados diarios como kéfir, kimchi, miso o kombucha, fibra prebiótica de cebolla, ajo, plátano verde y avena, ejercicio moderado que aumenta Lactobacillus, y sueño de calidad.",tips:["30 plantas por semana: el mayor predictor de diversidad","Fermentados diarios: kéfir, kimchi, miso","Fibra prebiótica: el alimento de las bacterias beneficiosas","El estrés crónico destruye el microbioma en semanas","Tras antibióticos: probiótico 10 UFC mínimo 4 semanas"]},
{id:59,t:"Leaky gut: síntomas, diagnóstico y protocolo de reparación",cat:"digestion",tag:"Intestino",e:"🫄",bg:"bg1",au:"Dr. Pérez",min:10,v:"8.7K",ex:"La permeabilidad intestinal puede ser la raíz de problemas de piel, autoinmunidad, fatiga y alergias.",p1:"La permeabilidad intestinal aumentada ocurre cuando las uniones estrechas entre las células intestinales se debilitan, permitiendo que moléculas bacterianas entren al torrente sanguíneo y activen una respuesta inflamatoria sistémica. Se manifiesta como piel inflamada, alergias e intolerancias nuevas, niebla mental, fatiga crónica y articulaciones dolorosas.",p2:"El protocolo de reparación conocido como las 4R: Remove (eliminar irritantes: gluten en sensibles, lácteos, alcohol, AINES), Replace (añadir enzimas digestivas), Reinoculate (probióticos 50 billones UFC más prebióticos) y Repair (glutamina 5-10g al día, zinc carnosina, colágeno). Este protocolo durante 6-8 semanas repara la barrera intestinal en la mayoría de casos.",tips:["Glutamina 5-10g al día: el reparador intestinal más respaldado","Zinc carnosina: repara específicamente la mucosa","Eliminar gluten y alcohol es el primer paso","Probióticos a 50 billones UFC para repoblación","El colágeno aporta glicina esencial para la mucosa"]},
{id:60,t:"Caída del cabello en mujeres: causas y soluciones reales",cat:"cabello",tag:"Alopecia",e:"💇‍♀️",bg:"bg3",au:"Tricóloga Blanco",min:11,v:"19K",ex:"Las 7 causas más comunes de la caída femenina que los médicos tardan en diagnosticar.",p1:"Las causas más frecuentes de caída femenina ordenadas por prevalencia: déficit de ferritina (la mayoría de tricólogos piden ferritina mayor de 70 para crecimiento óptimo), hipotiroidismo, déficit de zinc, déficit de vitamina D, efluvio telógeno post-estrés (el cabello cae 2-3 meses después del evento estresante, no durante), exceso de andrógenos, y déficit de biotina.",p2:"Antes de gastar en suplementos capilares caros, hazte la analítica: ferritina, TSH más T4 libre, zinc, vitamina D, hemograma e hierro sérico. El 80% de los casos de caída femenina tienen causa corregible. El tratamiento más respaldado científicamente y más efectivo: minoxidil tópico al 2-5%, que funciona en la mayoría de tipos de alopecia no cicatricial.",tips:["Ferritina: el primer marcador que verificar","La caída sucede 2-3 meses después del estrés, no durante","Minoxidil 2-5% tópico: el tratamiento más efectivo","Biotina solo ayuda si hay déficit confirmado","MSM 1g/día: mejora la calidad del cabello en estudios"]},
{id:61,t:"Aceites para el cuero cabelludo: cuál usar y cómo",cat:"cabello",tag:"Aceites",e:"🫙",bg:"bg2",au:"Hair Lab",min:6,v:"7.8K",ex:"Los aceites con respaldo científico para estimular el crecimiento, reducir la caída y mejorar la densidad.",p1:"El aceite de romero demostró en un estudio de 2015 ser tan efectivo como el minoxidil al 2% para el crecimiento capilar a los 6 meses, con menos efectos secundarios. El mecanismo es la estimulación de la circulación del cuero cabelludo. Aplica 3-5 gotas directamente sobre el cuero cabelludo y masajea durante 3-5 minutos; deja actuar mínimo 30 minutos antes de lavar.",p2:"Otros aceites con evidencia: aceite de ricino (castor oil) con ricinoleic acid que mejora la circulación capilar. El aceite de argán es el mejor para las puntas ya que sella la cutícula. Para cueros cabelludos con caspa: aceite de árbol de té al 5% en champú tiene evidencia para reducir Malassezia. El aceite de coco penetra el tallo capilar mejor que ningún otro aceite.",tips:["Aceite de romero: tan efectivo como minoxidil 2%","Masaje de cuero cabelludo 3-5 min: estimula circulación","Aceite de argán para puntas: sella la cutícula","Aceite de árbol de té 5%: específico para caspa","Aceite de coco: el mejor protector proteico del tallo"]},
{id:62,t:"Zonas azules: los 9 hábitos de quienes viven más y mejor",cat:"longevidad",tag:"Zonas Azules",e:"🌍",bg:"bg2",au:"Blue Zones Research",min:9,v:"11K",ex:"Las cinco zonas del mundo con mayor concentración de centenarios tienen más en común de lo que imaginas.",p1:"Las cinco zonas azules (Cerdeña, Okinawa, Nicoya, Loma Linda, Icaria) comparten 9 denominadores comunes llamados Power 9: mover el cuerpo de forma natural e inconsciente todo el día, tener propósito de vida (ikigai en japonés), rituales de reducción del estrés como siesta o meditación, regla del 80% para dejar de comer cuando se está 80% lleno, y dieta basada en plantas con legumbres como base.",p2:"El resto del Power 9: alcohol moderado con contexto social (vino con amigos y comida), pertenencia a comunidad con propósito compartido, comunidad que apoya hábitos saludables, y familia primero en la jerarquía de valores. La soledad es el mayor factor de riesgo de muerte prematura, equivalente a fumar 15 cigarrillos al día según meta-análisis recientes.",tips:["Propósito de vida: el factor más diferenciador","Regla del 80%: para cuando sientes el 80% de saciedad","Legumbres diarias: el alimento de los centenarios","La conexión social protege igual que el ejercicio","Movimiento natural todo el día supera al gym puntual"]},
{id:63,t:"Telómeros: cómo ralentizar el reloj biológico",cat:"longevidad",tag:"Telómeros",e:"⏳",bg:"bg3",au:"Dr. Blackburn",min:9,v:"8.3K",ex:"Los telómeros son los relojes biológicos de cada célula. La ciencia ha descubierto formas reales de ralentizar su acortamiento.",p1:"Los telómeros son las tapas protectoras de los cromosomas. Se acortan con cada división celular, y cuando alcanzan una longitud mínima la célula muere o entra en senescencia. Elizabeth Blackburn ganó el Nobel de Medicina en 2009 por descubrir la telomerasa, la enzima que repara y alarga los telómeros. Su longitud es uno de los mejores marcadores del envejecimiento biológico.",p2:"Hábitos que acortan los telómeros de forma acelerada: estrés crónico, sedentarismo, dieta inflamatoria, privación de sueño y tabaco. Hábitos que los protegen: ejercicio aeróbico moderado regular que activa la telomerasa, meditación de 12 minutos diarios según estudio de UC Davis, omega-3 EPA+DHA, vitamina D3 en rango óptimo y una dieta mediterránea con abundantes polifenoles.",tips:["Meditación 12 min diarios: activa la telomerasa","Omega-3 EPA+DHA: uno de los más protectores","El estrés crónico: mayor acelerador del acortamiento","Ejercicio aeróbico moderado activa la telomerasa","Vitamina D3 en rango óptimo correlaciona con telómeros más largos"]},
{id:64,t:"Energía sin cafeína: el protocolo completo",cat:"energia",tag:"Energía Natural",e:"⚡",bg:"bg4",au:"Bioenergética Lab",min:9,v:"14K",ex:"Las causas reales de la fatiga que ningún café puede solucionar y el protocolo que las aborda en su raíz.",p1:"Las causas más comunes de fatiga crónica que se ignoran: déficit de vitamina D (el 60% de la población española), niveles bajos de ferritina aunque la hemoglobina sea normal, deshidratación subclínica (la sed aparece con 2% de deshidratación que ya reduce el rendimiento cognitivo), y apnea del sueño no diagnosticada que afecta al 30% de adultos con sobrepeso.",p2:"El protocolo de energía sin estimulantes: exposición a luz solar en los primeros 30 minutos del día para regular el cortisol circadiano y la dopamina, desayuno con proteína para estabilizar la glucosa durante las primeras horas, hidratación de 500ml al despertar antes del café, movimiento de 10 minutos a media tarde como el mayor antídoto natural a la fatiga vespertina.",tips:["500ml de agua al despertar: cambia la energía del día","Luz solar primeros 30 min: activa dopamina y cortisol","Desayuno rico en proteína: estabiliza energía 4-5h","10 min de movimiento a las 15h: elimina la fatiga vespertina","Analítica: descarta déficit de D3, ferritina y tiroides"]}

// ===== ROUTER & STATE =====
let currentView = 'home';
let currentParam = null;

function goTo(view, param) {
  currentView = view;
  currentParam = param || null;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function scrollToNL() {
  goTo('home');
  setTimeout(()=>{
    const el = document.getElementById('newsletter');
    if(el) el.scrollIntoView({behavior:'smooth'});
  }, 400);
}

// ===== HELPERS =====
function byCat(cat, limit) {
  const r = ARTICLES.filter(a=>a.cat===cat);
  return limit ? r.slice(0,limit) : r;
}
function byIds(ids) {
  return ids.map(id=>ARTICLES.find(a=>a.id===id)).filter(Boolean);
}
function search(q) {
  const ql = q.toLowerCase();
  return ARTICLES.filter(a=>
    a.t.toLowerCase().includes(ql) ||
    a.tag.toLowerCase().includes(ql) ||
    a.ex.toLowerCase().includes(ql) ||
    a.cat.toLowerCase().includes(ql)
  );
}

function card(a, dark) {
  const cls = dark ? 'acard acard-dark' : 'acard';
  return `<a class="${cls}" href="#" onclick="goTo('article',${a.id});return false">
    <div class="ci ${a.bg}">${a.e}</div>
    <div class="cb">
      <span class="ct">${a.tag}</span>
      <div class="ctitle">${a.t}</div>
      <div class="cm">${a.au} · ${a.min} min · ${a.v} lecturas</div>
    </div>
  </a>`;
}

function gcard(a) {
  return `<a class="gcard" href="#" onclick="goTo('article',${a.id});return false">
    <div class="gci">
      <div class="gcbg ${a.bg}">${a.e}</div>
      <div class="gcov"></div>
      <div class="gcc">
        <p class="gc-tag">${a.tag} · ${a.min} min</p>
        <div class="gc-t">${a.t}</div>
        <p class="gc-m">${a.au} · ${a.v} lecturas</p>
      </div>
    </div>
  </a>`;
}

function masonCard(a, hcls) {
  return `<a class="mason-item" href="#" onclick="goTo('article',${a.id});return false">
    <div class="mimg ${hcls} ${a.bg}">${a.e}</div>
    <div class="mb">
      <p class="mtag">${a.tag}</p>
      <div class="mt">${a.t}</div>
      <div class="mm">${a.au} · ${a.min} min</div>
    </div>
  </a>`;
}

function trItem(a, n) {
  return `<a class="tr-item" href="#" onclick="goTo('article',${a.id});return false">
    <div class="tr-n">0${n}</div>
    <div><div class="tr-t">${a.t}</div><div class="tr-m">${a.tag} · ${a.min} min · ${a.v}</div></div>
    <div class="tr-e">${a.e}</div>
  </a>`;
}

function secHead(eye, title, cat, dark) {
  const eLit = dark ? 's-eye s-eye-lt' : 's-eye';
  const tCol = dark ? 'style="color:var(--c)"' : '';
  const emCol = dark ? 'style="color:var(--bl)"' : '';
  const aCol = dark ? 'class="va va-lt"' : 'class="va"';
  return `<div class="s-head">
    <div><p class="${eLit}">${eye}</p><h2 class="s-title" ${tCol}>${title}</h2></div>
    ${cat ? `<a ${aCol} href="#" onclick="goTo('cat','${cat}');return false">Ver todos →</a>` : ''}
  </div>`;
}

function nlSection() {
  return `<div class="nl-sec" id="newsletter">
    <h2 class="nl-t">Tu dosis semanal de <em>bienestar</em></h2>

      <input type="email" id="nl-email" placeholder="tu@email.com" class="nl-in">

function subscribeNL() {
  const e = document.getElementById('nl-email');
  if(e && e.value && e.value.includes('@')) {
    document.getElementById('nl-form').style.display='none';
    document.getElementById('nl-ok').style.display='block';
  }
}

function doSearch() {
  const q = document.getElementById('srch-in')?.value?.trim();
  if(q) goTo('search', q);
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  if(currentView === 'home') app.innerHTML = renderHome();
  else if(currentView === 'article') app.innerHTML = renderArticle(currentParam);
  else if(currentView === 'cat') app.innerHTML = renderCat(currentParam);
  else if(currentView === 'search') app.innerHTML = renderSearch(currentParam);
  initAnimations();
}

function initAnimations() {
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')});
  },{threshold:0.07});
  document.querySelectorAll('.fu').forEach(el=>obs.observe(el));
  window.addEventListener('scroll',()=>{
    const n=document.getElementById('main-nav');
    if(n) n.style.padding = window.scrollY>60 ? '12px 48px' : '18px 48px';
  },{passive:true});
}

const cur=document.getElementById('cursor'),cring=document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function anim(){
  cur.style.left=mx+'px';cur.style.top=my+'px';
  rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
  cring.style.left=rx+'px';cring.style.top=ry+'px';
  requestAnimationFrame(anim);
})();
document.addEventListener('mouseover',e=>{
  if(e.target.closest('a,button,.acard,.cat-card,.gcard,.mason-item,.tr-item,.tip-c')){
    cur.style.width='20px';cur.style.height='20px';
    cring.style.width='50px';cring.style.height='50px';
  }
});
